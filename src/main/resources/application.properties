spring.application.name=authcore
server.port=8080

# ----- MySQL datasource -----
spring.datasource.url=jdbc:mysql://localhost:3306/authcore
spring.datasource.username=authcore
spring.datasource.password=authcorepass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ----- JPA / Hibernate -----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ----- Redis -----
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.jpa.open-in-view=false

# ----- JWT -----
jwt.secret=ZmFrZS1kZXYtc2VjcmV0LWNoYW5nZS1pbi1wcm9kdWN0aW9uLW11c3QtYmUtMzItYnl0ZXMtbWluaW11bQ==
jwt.access-token-expiration-ms=900000
